<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome — Swayam's Portfolio</title>
    <meta name="description" content="An immersive cinematic entry to Swayam Sahu's developer portfolio.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        /* ── Reset ── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: #050510;
            color: #e8e8ff;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ── Particle Canvas ── */
        #dustCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* ── Light Overlay ── */
        .light-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            background: radial-gradient(ellipse 600px 700px at var(--lx, 50%) var(--ly, 28%),
                    rgba(255, 210, 100, 0.18) 0%,
                    rgba(255, 180, 60, 0.08) 30%,
                    rgba(255, 140, 30, 0.03) 55%,
                    transparent 80%);
        }

        .light-overlay.on {
            opacity: 1;
        }

        /* ── Scene ── */
        .scene {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 3;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        /* ── Lamp Assembly ── */
        .lamp-assembly {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 0;
            transform-origin: top center;
            transition: transform 0.1s linear;
        }

        /* Ceiling mount */
        .ceiling-mount {
            width: 60px;
            height: 8px;
            background: linear-gradient(180deg, #3a3a4a, #252535);
            border-radius: 0 0 6px 6px;
            position: relative;
            z-index: 5;
        }

        /* Cord */
        .lamp-cord {
            width: 2px;
            height: clamp(120px, 22vh, 200px);
            background: linear-gradient(180deg, #555568, #44445a);
            position: relative;
            z-index: 4;
        }

        /* Lamp head (shade + bulb) */
        .lamp-head {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        /* Shade — trapezoid */
        .lamp-shade {
            width: 100px;
            height: 50px;
            background: linear-gradient(180deg, #2a2a3d, #1e1e30);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            position: relative;
            border-bottom: 2px solid rgba(255, 200, 80, 0.05);
            z-index: 5;
        }

        /* Bulb */
        .bulb-container {
            position: relative;
            margin-top: -4px;
            z-index: 4;
        }

        .bulb {
            width: 28px;
            height: 36px;
            background: radial-gradient(circle at 50% 40%, #3a3a50, #252538);
            border-radius: 50% 50% 45% 45%;
            transition: background 1s ease, box-shadow 1s ease;
            position: relative;
        }

        .bulb.on {
            background: radial-gradient(circle at 50% 40%, #fff8e1, #ffe082, #ffcc40);
            box-shadow:
                0 0 20px rgba(255, 200, 80, 0.6),
                0 0 60px rgba(255, 180, 60, 0.35),
                0 0 120px rgba(255, 160, 40, 0.2),
                0 0 200px rgba(255, 140, 20, 0.1);
        }

        /* Filament */
        .filament {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 14px;
            border: 1.5px solid rgba(180, 160, 120, 0.3);
            border-top: none;
            border-radius: 0 0 50% 50%;
            transition: border-color 0.8s ease;
        }

        .bulb.on .filament {
            border-color: rgba(255, 240, 180, 0.9);
            box-shadow: 0 0 6px rgba(255, 220, 100, 0.5);
        }

        /* Light cone below the bulb */
        .light-cone {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 120px solid transparent;
            border-right: 120px solid transparent;
            border-top: 350px solid rgba(255, 210, 100, 0);
            pointer-events: none;
            transition: border-top-color 1.5s ease;
            filter: blur(30px);
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .light-cone.on {
            opacity: 1;
            border-top-color: rgba(255, 210, 100, 0.06);
        }

        /* ── Pull String ── */
        .pull-string {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: grab;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .pull-string:active {
            cursor: grabbing;
        }

        .pull-string:hover .string-bead {
            box-shadow: 0 0 12px rgba(255, 200, 80, 0.4);
            border-color: rgba(255, 200, 80, 0.6);
        }

        .pull-string:hover .string-line {
            background: rgba(200, 190, 170, 0.6);
        }

        .string-line {
            width: 1.5px;
            height: 45px;
            background: rgba(160, 150, 130, 0.4);
            transition: background 0.3s ease;
        }

        .string-bead {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #555, #333);
            border: 1.5px solid rgba(200, 190, 170, 0.3);
            transition: box-shadow 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
        }

        /* Pull hint label */
        .pull-hint {
            position: absolute;
            bottom: -38px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            font-weight: 400;
            color: rgba(200, 195, 180, 0.35);
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
            animation: hintPulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes hintPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        /* ── Swing Animation ── */
        @keyframes lampSwing {
            0% { transform: rotate(0deg); }
            15% { transform: rotate(4deg); }
            30% { transform: rotate(-3deg); }
            45% { transform: rotate(2.5deg); }
            60% { transform: rotate(-1.5deg); }
            75% { transform: rotate(1deg); }
            90% { transform: rotate(-0.5deg); }
            100% { transform: rotate(0deg); }
        }

        .lamp-assembly.swinging {
            animation: lampSwing 1.6s ease-out forwards;
        }

        /* ── String Pull Animation ── */
        @keyframes stringPull {
            0% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(18px); }
            100% { transform: translateX(-50%) translateY(0); }
        }

        .pull-string.pulled {
            animation: stringPull 0.5s ease-out forwards;
        }

        /* ── Flicker Animation (for NO) ── */
        @keyframes flicker {
            0% { opacity: 1; }
            10% { opacity: 0.4; }
            20% { opacity: 0.9; }
            30% { opacity: 0.2; }
            40% { opacity: 0.8; }
            50% { opacity: 0.1; }
            60% { opacity: 0.6; }
            70% { opacity: 0.05; }
            80% { opacity: 0.3; }
            100% { opacity: 0; }
        }

        /* ── Glassmorphism Card ── */
        .prompt-card {
            position: fixed;
            right: 8%;
            top: 50%;
            transform: translateY(-50%) translateX(60px);
            width: clamp(300px, 28vw, 420px);
            padding: 44px 36px;
            background: rgba(20, 20, 48, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.4),
                0 0 80px rgba(255, 200, 80, 0.04);
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .prompt-card.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(-50%) translateX(0);
        }

        .prompt-card h2 {
            font-size: clamp(1.1rem, 1.8vw, 1.45rem);
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 32px;
            color: #f0ece4;
        }

        .prompt-card h2 span {
            background: linear-gradient(135deg, #ffcc40, #ff9e40);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .prompt-buttons {
            display: flex;
            gap: 16px;
        }

        .prompt-btn {
            flex: 1;
            padding: 14px 24px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
        }

        .prompt-btn.yes {
            background: linear-gradient(135deg, #ffcc40, #ff9e40);
            color: #1a1a2e;
            box-shadow: 0 0 24px rgba(255, 180, 60, 0.2);
        }

        .prompt-btn.yes:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(255, 180, 60, 0.4), 0 6px 20px rgba(255, 180, 60, 0.15);
        }

        .prompt-btn.no {
            background: rgba(255, 255, 255, 0.06);
            color: #a0a0b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .prompt-btn.no:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0f0;
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        /* ── Transition Overlay ── */
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            background: radial-gradient(circle at var(--lx, 50%) var(--ly, 28%),
                    rgba(255, 230, 160, 1) 0%,
                    rgba(255, 210, 100, 0.9) 20%,
                    rgba(20, 18, 40, 1) 80%);
            transition: opacity 1.2s ease;
        }

        .transition-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        /* ── Ambient floor glow ── */
        .floor-glow {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(to top, rgba(255, 200, 80, 0) 0%, transparent 100%);
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .floor-glow.on {
            opacity: 1;
            background: linear-gradient(to top, rgba(255, 200, 80, 0.03) 0%, transparent 100%);
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .prompt-card {
                right: 50%;
                top: auto;
                bottom: 6%;
                transform: translateX(50%) translateY(40px);
                width: clamp(280px, 85vw, 400px);
                padding: 32px 28px;
            }

            .prompt-card.visible {
                transform: translateX(50%) translateY(0);
            }
        }

        @media (max-width: 480px) {
            .lamp-shade {
                width: 80px;
                height: 40px;
            }

            .bulb {
                width: 22px;
                height: 28px;
            }

            .prompt-card {
                padding: 28px 22px;
            }

            .prompt-card h2 {
                font-size: 1rem;
                margin-bottom: 24px;
            }
        }
    </style>
</head>

<body>

    <!-- Dust Particle Canvas -->
    <canvas id="dustCanvas"></canvas>

    <!-- Warm Light Overlay -->
    <div class="light-overlay" id="lightOverlay"></div>

    <!-- Floor Glow -->
    <div class="floor-glow" id="floorGlow"></div>

    <!-- Scene -->
    <div class="scene">
        <!-- Lamp Assembly -->
        <div class="lamp-assembly" id="lampAssembly">
            <div class="ceiling-mount"></div>
            <div class="lamp-cord"></div>
            <div class="lamp-head">
                <div class="lamp-shade"></div>
                <div class="bulb-container">
                    <div class="bulb" id="bulb">
                        <div class="filament"></div>
                    </div>
                    <div class="light-cone" id="lightCone"></div>
                    <!-- Pull String -->
                    <div class="pull-string" id="pullString">
                        <div class="string-line"></div>
                        <div class="string-bead"></div>
                        <div class="pull-hint">pull</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Glassmorphism Prompt Card -->
    <div class="prompt-card" id="promptCard">
        <h2>Are you excited to explore <span>Swayam's</span> portfolio?</h2>
        <div class="prompt-buttons">
            <button class="prompt-btn yes" id="btnYes">YES</button>
            <button class="prompt-btn no" id="btnNo">NO</button>
        </div>
    </div>

    <!-- Transition Overlay -->
    <div class="transition-overlay" id="transitionOverlay"></div>

    <script>
        // ── Elements ──
        const dustCanvas = document.getElementById('dustCanvas');
        const ctx = dustCanvas.getContext('2d');
        const lightOverlay = document.getElementById('lightOverlay');
        const floorGlow = document.getElementById('floorGlow');
        const lampAssembly = document.getElementById('lampAssembly');
        const bulb = document.getElementById('bulb');
        const lightCone = document.getElementById('lightCone');
        const pullString = document.getElementById('pullString');
        const promptCard = document.getElementById('promptCard');
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const transitionOverlay = document.getElementById('transitionOverlay');

        let lampOn = false;
        let animating = false;
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        // ── Resize Canvas ──
        function resizeCanvas() {
            dustCanvas.width = window.innerWidth;
            dustCanvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ── Dust Particles ──
        class Dust {
            constructor() {
                this.reset();
                this.y = Math.random() * dustCanvas.height;
            }
            reset() {
                this.x = Math.random() * dustCanvas.width;
                this.y = -5;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = Math.random() * 0.3 + 0.08;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.opacity = Math.random() * 0.25 + 0.05;
                this.maxOpacity = this.opacity;
                this.drift = Math.random() * Math.PI * 2;
                this.driftSpeed = Math.random() * 0.005 + 0.002;
                this.parallax = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.y += this.speedY;
                this.drift += this.driftSpeed;
                this.x += this.speedX + Math.sin(this.drift) * 0.15;

                // Parallax from mouse
                const dx = (mouseX - dustCanvas.width / 2) / dustCanvas.width;
                const dy = (mouseY - dustCanvas.height / 2) / dustCanvas.height;
                this.x += dx * this.parallax * 0.3;
                this.y += dy * this.parallax * 0.1;

                if (this.y > dustCanvas.height + 10 || this.x < -20 || this.x > dustCanvas.width + 20) {
                    this.reset();
                }

                // Glow brighter when lamp is on and particle is near the light
                if (lampOn) {
                    const lightX = dustCanvas.width / 2;
                    const lightY = dustCanvas.height * 0.28;
                    const dist = Math.hypot(this.x - lightX, this.y - lightY);
                    const proximity = Math.max(0, 1 - dist / 500);
                    this.opacity = this.maxOpacity + proximity * 0.35;
                } else {
                    this.opacity += (this.maxOpacity - this.opacity) * 0.02;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                const color = lampOn
                    ? `rgba(255, 220, 160, ${this.opacity})`
                    : `rgba(180, 180, 200, ${this.opacity})`;
                ctx.fillStyle = color;
                ctx.fill();
            }
        }

        const particles = [];
        const PARTICLE_COUNT = 80;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Dust());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, dustCanvas.width, dustCanvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ── Mouse Tracking (for light direction + parallax) ──
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // Shift light origin slightly based on mouse
            const lx = 50 + ((e.clientX / window.innerWidth) - 0.5) * 8;
            const ly = 28 + ((e.clientY / window.innerHeight) - 0.5) * 4;
            document.documentElement.style.setProperty('--lx', lx + '%');
            document.documentElement.style.setProperty('--ly', ly + '%');

            // Subtle lamp tilt based on mouse (only when not swinging)
            if (!lampAssembly.classList.contains('swinging')) {
                const tilt = ((e.clientX / window.innerWidth) - 0.5) * 2;
                lampAssembly.style.transform = `rotate(${tilt}deg)`;
            }
        });

        // ── Pull String Interaction ──
        pullString.addEventListener('click', () => {
            if (animating) return;
            animating = true;

            // Animate string pull
            pullString.classList.add('pulled');

            // Swing the lamp
            lampAssembly.classList.remove('swinging');
            void lampAssembly.offsetWidth; // reflow
            lampAssembly.classList.add('swinging');

            setTimeout(() => {
                pullString.classList.remove('pulled');
            }, 500);

            if (!lampOn) {
                turnOn();
            } else {
                turnOff();
            }

            setTimeout(() => {
                lampAssembly.classList.remove('swinging');
                animating = false;
            }, 1600);
        });

        function turnOn() {
            lampOn = true;
            bulb.classList.add('on');
            lightCone.classList.add('on');
            lightOverlay.classList.add('on');
            floorGlow.classList.add('on');

            // Show prompt card after a delay
            setTimeout(() => {
                promptCard.classList.add('visible');
            }, 1200);
        }

        function turnOff(doFlicker = false) {
            lampOn = false;
            promptCard.classList.remove('visible');

            if (doFlicker) {
                // Flicker effect
                lightOverlay.style.animation = 'flicker 0.8s ease-out forwards';
                bulb.style.animation = 'flicker 0.8s ease-out forwards';
                lightCone.style.animation = 'flicker 0.8s ease-out forwards';

                setTimeout(() => {
                    bulb.classList.remove('on');
                    lightCone.classList.remove('on');
                    lightOverlay.classList.remove('on');
                    floorGlow.classList.remove('on');

                    // Reset animations
                    lightOverlay.style.animation = '';
                    bulb.style.animation = '';
                    lightCone.style.animation = '';
                }, 800);
            } else {
                bulb.classList.remove('on');
                lightCone.classList.remove('on');
                lightOverlay.classList.remove('on');
                floorGlow.classList.remove('on');
            }
        }

        // ── YES Button ──
        btnYes.addEventListener('click', () => {
            transitionOverlay.classList.add('active');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1200);
        });

        // ── NO Button ──
        btnNo.addEventListener('click', () => {
            if (animating) return;
            animating = true;

            // Swing
            lampAssembly.classList.remove('swinging');
            void lampAssembly.offsetWidth;
            lampAssembly.classList.add('swinging');

            turnOff(true);

            setTimeout(() => {
                lampAssembly.classList.remove('swinging');
                animating = false;
            }, 1600);
        });
    </script>

</body>

</html>
